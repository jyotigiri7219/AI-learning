<!-- index.html -->
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Will You Be Mine?</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <!-- Floating background stars/hearts -->
    <div class="bg-decoration"></div>

    <div class="proposal-container">
        <div class="card" id="mainCard">
            <!-- Animated Main Heart -->
            <div class="heart-wrapper">
                <div class="heart-pulse"></div>
                <div class="heart-icon">💖</div>
            </div>
            
            <h1 class="title">I have a secret to tell you...</h1>
            <p class="message">My days are brighter when you are in them. Will you make me the luckiest person and be mine?</p>
            
            <div class="btn-group">
                <button class="btn yes-btn" onclick="celebrate()">Yes, I will! ✨</button>
                <!-- Teleporting No Button -->
                <button class="btn no-btn" id="noBtn" onmouseenter="teleportButton(this)">No 😢</button>
            </div>
        </div>
    </div>

<!-- Replace your current script section in index.html with this updated logic -->
<script>
    function teleportButton(button) {
        // Safe viewport dimensions
        const viewportWidth = window.innerWidth;
        const viewportHeight = window.innerHeight;

        // Exact button dimensions
        const btnWidth = button.offsetWidth;
        const btnHeight = button.offsetHeight;

        // Set a 30px safe zone boundary from the screen edges
        const padding = 30; 

        // Calculate maximum safe coordinates
        const maxX = viewportWidth - btnWidth - padding;
        const maxY = viewportHeight - btnHeight - padding;

        // Ensure we don't get negative bounds on super small screens
        const safeMaxX = maxX > padding ? maxX : padding;
        const safeMaxY = maxY > padding ? maxY : padding;

        // Generate coordinates strictly within the visible viewport
        const randomX = Math.floor(Math.random() * (safeMaxX - padding + 1)) + padding;
        const randomY = Math.floor(Math.random() * (safeMaxY - padding + 1)) + padding;

        // Apply instant teleportation layout
        button.style.position = 'fixed';
        button.style.left = randomX + 'px';
        button.style.top = randomY + 'px';
        button.style.zIndex = '9999';
    }

    function celebrate() {
        const card = document.getElementById('mainCard');
        
        // Clean up teleported button safely
        const noBtn = document.getElementById('noBtn');
        if (noBtn) noBtn.remove();

        // Trigger success view
        card.innerHTML = `
            <div class="success-animation">
                <div class="heart-icon huge">🥰</div>
            </div>
            <h1 class="title success-text">YAY! You said YES! 🥂</h1>
            <p class="message">You just made my entire world! I can't wait to make countless beautiful memories together. ❤️✨</p>
        `;
        
        createConfetti();
    }

    function createConfetti() {
        for(let i = 0; i < 50; i++) {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.animationDelay = Math.random() * 2 + 's';
            confetti.style.backgroundColor = ['#ff4d6d', '#ff758f', '#fff', '#ffb3c6'][Math.floor(Math.random() * 4)];
            document.body.appendChild(confetti);
        }
    }
</script>

</body>
</html>
